# nginx-viz.conf
# ---------------
# Raw TCP stream proxy for the vsepr viz dual-port server.
#
# vsepr viz runs inside WSL on 0.0.0.0:9999 and 0.0.0.0:10001.
# nginx proxies those ports so Windows-side Python viewers
# can connect to localhost:9999 and localhost:10001.
#
# Install:
#   sudo cp deploy/nginx-viz.conf /etc/nginx/conf.d/viz.conf
#   sudo nginx -t && sudo nginx -s reload   (or: sudo systemctl start nginx)
#
# The 'stream' module must be present (default in most nginx packages).

worker_processes 1;
error_log /tmp/nginx-viz-error.log warn;
pid       /tmp/nginx-viz.pid;

events {
    worker_connections 64;
}

# ── Raw TCP passthrough ────────────────────────────────────────────────────────
stream {

    log_format viz '$remote_addr [$time_local] '
                   '$protocol $status $bytes_sent $bytes_received '
                   '$session_time';

    access_log /tmp/nginx-viz-access.log viz;

    # Port 9999 — Atomic View (fast, 15 fps NDJSON)
    server {
        listen      9999;
        proxy_pass  127.0.0.1:9999;
        proxy_timeout       30s;
        proxy_connect_timeout 2s;
    }

    # Port 10001 — Analysis View (2 fps NDJSON, larger frames)
    server {
        listen      10001;
        proxy_pass  127.0.0.1:10001;
        proxy_timeout       60s;
        proxy_connect_timeout 2s;
    }

}
