<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>chem_shell viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>chem_shell <span class="version">v0.1</span></h1>
  </header>
  <main>
    <section id="reaction-card">
      <div class="label">Reaction</div>
      <div id="rxn" class="value">--</div>

      <div class="label">Classification</div>
      <div id="cls" class="value">--</div>

      <div class="label">Energy</div>
      <div id="energy" class="value">--</div>

      <div class="label">Mode</div>
      <div id="mode" class="value">--</div>

      <div class="label">Animation</div>
      <div id="anim" class="value">--</div>
    </section>
    <footer id="ts">last update: --</footer>
  </main>
  <script src="app.js"></script>
</body>
</html>
